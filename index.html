<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courier Córdoba - Repartidor</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-content">
      <h1>🚀 Courier Córdoba</h1>
      <div class="user-info">
        <span id="repartidor-name">Juan Pérez</span>
        <span class="status online">● En línea</span>
      </div>
    </div>
  </header>

  <main>
    <!-- Mapa -->
    <div class="map-container">
      <div id="map"></div>
    </div>

    <!-- Lista de Pedidos -->
    <div class="pedidos-container">
      <h2>Mis Pedidos <span id="pedidos-count">(0)</span></h2>
      <div id="lista-pedidos"></div>
    </div>

    <!-- Acciones rápidas -->
    <div class="actions">
      <button id="btn-ubicacion">📍 Actualizar Ubicación</button>
      <button id="btn-simular">▶️ Simular Movimiento</button>
    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
